name: Sync Dashboard Data

on:
  schedule:
    - cron: '0 10 * * *'      # 07:00 BRT (10:00 UTC) — todos os dias
  workflow_dispatch:           # botao manual no GitHub Actions

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Criar pastas de dados
        run: mkdir -p painel/data/pace painel/data/com painel/data/kommo

      # ── HEALTH SCORES (Cockpit MCP) ──────────────────────────────────────
      - name: Health Scores — Cockpit
        env:
          COCKPIT_TOKEN: ${{ secrets.COCKPIT_TOKEN }}
        run: |
          # 1. Initialize session
          curl -s -D /tmp/hs_headers.txt -X POST \
            "https://mcp-cockpit.dados.collieassociados.com/mcp" \
            -H "Authorization: Bearer $COCKPIT_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"gh-sync","version":"1.0"}}}' \
            -o /tmp/hs_init.txt --max-time 15

          SESSION=$(grep -i 'mcp-session-id:' /tmp/hs_headers.txt | awk '{print $2}' | tr -d '\r\n')
          echo "Cockpit session: $SESSION"

          # 2. Query all projects with health score. NOTA: "fetchAllPages":true da 403 Forbidden com o
          #    token deste repo (Strapi rejeita — token com escopo mais restrito que o do dashboard local).
          #    Usa pageSize maior (200, cobre toda a carteira ~199 projetos) sem fetchAllPages.
          curl -s -X POST \
            "https://mcp-cockpit.dados.collieassociados.com/mcp" \
            -H "Authorization: Bearer $COCKPIT_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -H "mcp-session-id: $SESSION" \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"cockpit_query_table","arguments":{"page":1,"pageSize":200,"resolveCalculations":true}}}' \
            -o /tmp/hs_raw.txt --max-time 60

          # 3. Extrair o corpo JSON — resposta pode vir como SSE ("data: {...}") ou como JSON puro,
          #    dependendo do gateway. Trata os dois formatos.
          BODY=$(grep '^data:' /tmp/hs_raw.txt | sed 's/^data: //')
          if [ -z "$BODY" ]; then BODY=$(cat /tmp/hs_raw.txt); fi

          # 4. Filtrar clientes Colli. Ticker real da Fares Aquino no Cockpit e FARE1 (nao FARS).
          #    "SOL" (Solucao Locadora) e "NEWS" (New Safes) sao renomeados pro apelido interno usado no resto
          #    do painel (SOLC/NWSF), igual ao CK_TICKER_MAP do dashboard/server.js.
          echo "$BODY" | jq '.result.content[0].text | fromjson |
              { updatedAt: (now | todate),
                data: [.data[] | select(.ticker | test("^(ACCE|NATU|FARE1|MSZB|SOTB|TAWV|SOL|NEWS)$")) |
                  { ticker: ({SOL:"SOLC", NEWS:"NWSF"}[.ticker] // .ticker),
                    name, algorithm_flag, algorithm_health_avg_score, lt,
                    projectStartDate, churnDate, atendimentoDiarioAtivo }]
              }' > painel/data/health_scores.json 2>/tmp/hs_jq_err.txt \
            || { echo "jq falhou — primeiros 300 chars da resposta:"; echo "$BODY" | head -c 300; echo; cat /tmp/hs_jq_err.txt; \
                 echo '{"updatedAt":"","data":[],"error":"parse failed"}' > painel/data/health_scores.json; }

          echo "Health scores salvos: $(jq '.data | length' painel/data/health_scores.json) clientes"

      # ── GROWTHPACE (Google Sheets) ────────────────────────────────────────
      - name: GrowthPace — Google Sheets
        run: |
          # NATU/SOLC/NWSF ficam de fora por enquanto: nao localizei ainda a aba/gid certa da tabela mensal
          # nessas planilhas (o parser do dashboard/server.js descobre isso dinamicamente testando todas as
          # abas; aqui e feito por gid fixo). Prefiro deixar de fora a inventar um gid errado.
          declare -A PACE_SHEETS=(
            ["ACCE"]="1DJYnq3qXC9Td8Fip1LJvFy4qn8XBIIkcGhT8QC2m_M8:2105044438"
            ["MSZB"]="1Trpq5YTb4e_spNIG94bE12z1u6ZWPkPEr_wDPlcz29Y:368538734"
            ["TAWV"]="1qGWXaxS2yLu3jX9hTIxX87jwnT1ONi59kFNSSXVIaDY:2105044438"
            ["FARE1"]="1y_veFQsSb7q8Nzz_Q0ZD68D29vWM20c578JZDVZLkpU:105734657"
            ["SOTB"]="1GDiRcey6G4kmx0ybSoIhVJSMRx-LGM5Ae7LepLNMoB0:617612824"
          )
          declare -A COM_SHEETS=(
            ["FARE1"]="1X-tCWiJeRVLuRiCXjuGlpXBVbhcQRROQJRn_QefJeIo:285026569"
          )

          for TICKER in "${!PACE_SHEETS[@]}"; do
            INFO="${PACE_SHEETS[$TICKER]}"
            ID="${INFO%%:*}"; GID="${INFO##*:}"
            CSV=$(curl -sL "https://docs.google.com/spreadsheets/d/${ID}/export?format=csv&gid=${GID}" --max-time 20 -A "Mozilla/5.0")
            if echo "$CSV" | head -1 | grep -qi "<!DOCTYPE\|<html"; then
              CSV=$(curl -sL "https://docs.google.com/spreadsheets/d/${ID}/pub?gid=${GID}&single=true&output=csv" --max-time 20 -A "Mozilla/5.0")
            fi
            if [ -n "$CSV" ] && ! echo "$CSV" | head -1 | grep -qi "<!DOCTYPE"; then
              echo "$CSV" > "painel/data/pace/${TICKER}.csv"
              echo "Pace OK: $TICKER ($(echo "$CSV" | wc -l) linhas)"
            else
              echo "Pace FAIL: $TICKER"
              touch "painel/data/pace/${TICKER}.csv"
            fi
          done

          for TICKER in "${!COM_SHEETS[@]}"; do
            INFO="${COM_SHEETS[$TICKER]}"
            ID="${INFO%%:*}"; GID="${INFO##*:}"
            CSV=$(curl -sL "https://docs.google.com/spreadsheets/d/${ID}/export?format=csv&gid=${GID}" --max-time 20 -A "Mozilla/5.0")
            if echo "$CSV" | head -1 | grep -qi "<!DOCTYPE\|<html"; then
              CSV=$(curl -sL "https://docs.google.com/spreadsheets/d/${ID}/pub?gid=${GID}&single=true&output=csv" --max-time 20 -A "Mozilla/5.0")
            fi
            if [ -n "$CSV" ] && ! echo "$CSV" | head -1 | grep -qi "<!DOCTYPE"; then
              echo "$CSV" > "painel/data/com/${TICKER}.csv"
              echo "Com OK: $TICKER"
            else
              touch "painel/data/com/${TICKER}.csv"
            fi
          done

      # ── KOMMO CRM ─────────────────────────────────────────────────────────
      - name: Kommo — VLoca (ACCE)
        env:
          KOMMO_ACCE: ${{ secrets.KOMMO_ACCE }}
        run: |
          HOST="rodrigocampos716.kommo.com"
          PIPELINE=12500784

          declare -A STAGE_NAMES=(
            ["96545992"]="NOVO LEAD"
            ["104848015"]="Aguardando atendimento"
            ["96545996"]="EM DIAGNÓSTICO"
            ["96546000"]="QUALIFICADO (MQL)"
            ["96546004"]="Negociação (SQL)"
            ["102944911"]="REPROVADO"
            ["104848019"]="VENDA FUTURA"
            ["142"]="Venda ganha"
            ["143"]="DESQUALIFICADO"
          )
          STAGE_ORDER=(96545992 104848015 96545996 96546000 96546004 102944911 104848019 142 143)

          declare -A CNTS PRICES
          TOTAL=0 PAGE=1

          while true; do
            RESP=$(curl -s "https://${HOST}/api/v4/leads?pipeline_id=${PIPELINE}&limit=250&page=${PAGE}" \
              -H "Authorization: Bearer $KOMMO_ACCE" --max-time 20)
            N=$(echo "$RESP" | jq '._embedded.leads | length // 0' 2>/dev/null || echo 0)
            [ "$N" = "0" ] && break
            while IFS=$'\t' read -r SID PRICE; do
              CNTS[$SID]=$((${CNTS[$SID]:-0} + 1))
              PRICES[$SID]=$((${PRICES[$SID]:-0} + ${PRICE:-0}))
              TOTAL=$((TOTAL+1))
            done < <(echo "$RESP" | jq -r '._embedded.leads[] | "\(.status_id)\t\(.price//0)"' 2>/dev/null)
            echo "$RESP" | jq -e '._links.next' >/dev/null 2>&1 || break
            PAGE=$((PAGE + 1)); [ $PAGE -gt 60 ] && break
          done

          STAGES="["; FIRST=1; OTHER=0
          for SID in "${STAGE_ORDER[@]}"; do
            C=${CNTS[$SID]:-0}; P=${PRICES[$SID]:-0}; NM="${STAGE_NAMES[$SID]}"
            [ $FIRST -eq 0 ] && STAGES+=","
            STAGES+="{\"id\":$SID,\"name\":\"$NM\",\"count\":$C,\"price\":$P}"
            FIRST=0
          done
          for SID in "${!CNTS[@]}"; do
            [[ -n "${STAGE_NAMES[$SID]}" ]] || OTHER=$((OTHER + ${CNTS[$SID]}))
          done
          [ $OTHER -gt 0 ] && STAGES+=",{\"id\":0,\"name\":\"Outros funis\",\"count\":$OTHER,\"price\":0}"
          STAGES+="]"

          WON=${CNTS[142]:-0}; MQL=${CNTS[96546000]:-0}; SQL=${CNTS[96546004]:-0}
          DISQ=${CNTS[143]:-0}; ACTIVE=$((TOTAL - DISQ - WON)); REC=${PRICES[142]:-0}

          jq -n \
            --arg ua "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" \
            --arg brt "$(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M')" \
            --argjson stages "$STAGES" \
            --argjson total $TOTAL --argjson active $ACTIVE \
            --argjson mql $MQL --argjson sql $SQL --argjson won $WON --argjson rec $REC \
            '{updatedAt:$ua,updatedAtBRT:$brt,
              pipeline:{id:12500784,name:"Funil 1 – Motoqueiros"},
              stages:$stages,
              summary:{total:$total,active:$active,mql:$mql,sql:$sql,won:$won,receita:$rec}}' \
            > painel/data/kommo/ACCE.json
          echo "Kommo ACCE OK: $TOTAL leads ($MQL MQL, $SQL SQL, $WON ganhos)"

      - name: Kommo — Atlantica Maquinas (SOTB)
        env:
          KOMMO_SOTB: ${{ secrets.KOMMO_SOTB }}
        run: |
          HOST="atlanticamaquinas.kommo.com"
          PIPELINE=12730796

          # Checar se token esta configurado
          if [ -z "$KOMMO_SOTB" ]; then
            echo '{"updatedAt":"","error":"Secret KOMMO_SOTB nao configurado"}' \
              > painel/data/kommo/SOTB.json
            echo "Kommo SOTB: token nao configurado, pulando"
            exit 0
          fi

          declare -A CNTS PRICES
          TOTAL=0 PAGE=1

          while true; do
            RESP=$(curl -s "https://${HOST}/api/v4/leads?pipeline_id=${PIPELINE}&limit=250&page=${PAGE}" \
              -H "Authorization: Bearer $KOMMO_SOTB" --max-time 20)
            N=$(echo "$RESP" | jq '._embedded.leads | length // 0' 2>/dev/null || echo 0)
            [ "$N" = "0" ] && break
            while IFS=$'\t' read -r SID PRICE; do
              CNTS[$SID]=$((${CNTS[$SID]:-0} + 1))
              PRICES[$SID]=$((${PRICES[$SID]:-0} + ${PRICE:-0}))
              TOTAL=$((TOTAL+1))
            done < <(echo "$RESP" | jq -r '._embedded.leads[] | "\(.status_id)\t\(.price//0)"' 2>/dev/null)
            echo "$RESP" | jq -e '._links.next' >/dev/null 2>&1 || break
            PAGE=$((PAGE + 1)); [ $PAGE -gt 60 ] && break
          done

          # Buscar nomes das etapas do pipeline
          STAGES_RESP=$(curl -s "https://${HOST}/api/v4/leads/pipelines/${PIPELINE}?with=statuses" \
            -H "Authorization: Bearer $KOMMO_SOTB" --max-time 15)

          # Construir stages JSON com contagens
          STAGES=$(echo "$STAGES_RESP" | jq --argjson cnts "$(
            for SID in "${!CNTS[@]}"; do printf '"%s":%s,' "$SID" "${CNTS[$SID]}"; done | sed 's/,$//'
          )" '
            [ ._embedded.statuses[]
              | select(.type != 1)
              | {id, name, count: (($cnts[.id|tostring]) // 0), price: 0}
            ]' 2>/dev/null || echo "[]")

          WON=${CNTS[142]:-0}; DISQ=${CNTS[143]:-0}; REC=${PRICES[142]:-0}
          ACTIVE=$((TOTAL - DISQ - WON))

          jq -n \
            --arg ua "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" \
            --arg brt "$(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M')" \
            --argjson stages "${STAGES:-[]}" \
            --argjson total $TOTAL --argjson active $ACTIVE \
            --argjson won $WON --argjson rec $REC \
            '{updatedAt:$ua,updatedAtBRT:$brt,
              pipeline:{id:12730796,name:"Pipeline Principal"},
              stages:$stages,
              summary:{total:$total,active:$active,mql:0,sql:0,won:$won,receita:$rec}}' \
            > painel/data/kommo/SOTB.json
          echo "Kommo SOTB OK: $TOTAL leads ($WON ganhos)"

      # ── EKYTE TASKS ───────────────────────────────────────────────────────
      - name: Ekyte — Tarefas em Aberto
        env:
          EKYTE_TOKEN: ${{ secrets.EKYTE_TOKEN }}
        run: |
          RESULT=$(curl -s \
            "https://api.ekyte.com/api/companies/3597/workspaces/0/tasks?page=1&pageSize=60&statusCodes=1,2" \
            -H "Authorization: Bearer $EKYTE_TOKEN" \
            -H "Accept: application/json" \
            --max-time 15)

          if echo "$RESULT" | jq empty 2>/dev/null; then
            echo "$RESULT" | jq '{updatedAt: (now | todate), tasks: (.items // . // [])}' \
              > painel/data/ekyte_tasks.json
            echo "Tasks salvas: $(jq '.tasks | length' painel/data/ekyte_tasks.json)"
          else
            echo '{"updatedAt":"","tasks":[],"error":"api error"}' > painel/data/ekyte_tasks.json
          fi

      # ── TIMESTAMP ─────────────────────────────────────────────────────────
      - name: Salvar timestamp do sync
        run: |
          echo "{\"syncedAt\":\"$(date -u '+%Y-%m-%dT%H:%M:%SZ')\",\"syncedAtBRT\":\"$(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M')\"}" \
            > painel/data/last_sync.json

      # ── COMMIT ────────────────────────────────────────────────────────────
      - name: Commit e Push
        run: |
          git config user.name  "Dashboard Sync Bot"
          git config user.email "sync@github-actions.com"
          git add painel/data/
          git diff --staged --quiet \
            && echo "Sem alteracoes" \
            || (git commit -m "chore: sync $(TZ='America/Sao_Paulo' date '+%d/%m %H:%M') [skip ci]" && git push)
